name: Tutor
options:
  bundleIdPrefix: com.tutor
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"

packages:
  TutorPackages:
    path: .

targetTemplates:
  TutorApp:
    type: application
    sources:
      - path: TutorApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tutor.app
        INFOPLIST_KEY_CFBundleDisplayName: Tutor
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.education"
        GENERATE_INFOPLIST_FILE: true
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: TutorApp/Entitlements/Tutor.entitlements
        SWIFT_EMIT_LOC_STRINGS: true
      configs:
        debug:
          CODE_SIGN_IDENTITY: "-"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    dependencies:
      - package: TutorPackages
        product: TutorCore
      - package: TutorPackages
        product: TutorData
      - package: TutorPackages
        product: TutorAI
      - package: TutorPackages
        product: TutorFileProcessing
      - package: TutorPackages
        product: TutorKnowledge
      - package: TutorPackages
        product: TutorLearning
      - package: TutorPackages
        product: TutorGamification
      - package: TutorPackages
        product: TutorStudent
      - package: TutorPackages
        product: TutorLife
      - package: TutorPackages
        product: TutorJournal
      - package: TutorPackages
        product: TutorWorkspaces
      - package: TutorPackages
        product: TutorIntegrations
      - package: TutorPackages
        product: TutorChat
      - package: TutorPackages
        product: TutorUI

targets:
  Tutor-iOS:
    templates:
      - TutorApp
    platform: iOS
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        TARGETED_DEVICE_FAMILY: "1,2"

  Tutor-macOS:
    templates:
      - TutorApp
    platform: macOS
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "15.0"

  TutorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Tutor-macOS
      - package: TutorPackages
        product: TutorCore
      - package: TutorPackages
        product: TutorData
      - package: TutorPackages
        product: TutorLearning
      - package: TutorPackages
        product: TutorGamification

schemes:
  Tutor-iOS:
    build:
      targets:
        Tutor-iOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  Tutor-macOS:
    build:
      targets:
        Tutor-macOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TutorTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
